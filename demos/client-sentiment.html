<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Instrument Sans',system-ui,sans-serif;color:#E8ECF6;background:#060814}
  a{color:inherit}
  .app{display:grid;grid-template-columns:250px 1fr;min-height:100vh}
  @media(max-width:860px){.app{grid-template-columns:1fr}.side{display:none}}
  .side{background:linear-gradient(180deg,#0a1226,#070b18);border-right:1px solid rgba(255,255,255,.07);padding:22px 16px;position:sticky;top:0;height:100vh;overflow:auto}
  .logo{display:flex;align-items:center;gap:11px;margin-bottom:24px}
  .logo .mk{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#22D3EE,#8B5CF6,#EC4899);display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;color:#04101f}

  .rolebox{margin-top:22px;padding:14px;border:1px solid rgba(255,255,255,.09);border-radius:14px;background:rgba(255,255,255,.02)}

  .rolebox select{width:100%;margin-top:8px;background:rgba(3,7,18,.6);border:1px solid rgba(255,255,255,.14);border-radius:9px;color:#E8ECF6;padding:8px;font-family:inherit;font-size:13px}
  .rolebox .who{margin-top:10px;font-size:12px;color:#9AA4BD}
  .main{padding:24px clamp(16px,3vw,36px) 60px;overflow:auto}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:20px}
  .demo-badge{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#FDE047;padding:6px 12px;border:1px solid rgba(253,224,71,.35);background:rgba(253,224,71,.08);border-radius:999px}
  .demo-badge b{width:6px;height:6px;border-radius:50%;background:#FDE047;box-shadow:0 0 8px #FDE047}
  .back{text-decoration:none;font-size:13px;color:#9AA4BD;padding:7px 13px;border:1px solid rgba(255,255,255,.12);border-radius:10px;background:rgba(255,255,255,.03)}
  .back:hover{color:#fff}
  h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(22px,3.4vw,32px);letter-spacing:-.01em}
  .sub{color:#8A94AD;font-size:14px;margin-top:6px}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#7FE6F5}
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:22px}
  @media(max-width:860px){.kpis{grid-template-columns:1fr 1fr}}
  .kpi{border:1px solid rgba(255,255,255,.09);border-radius:16px;padding:18px;background:linear-gradient(160deg,rgba(255,255,255,.05),rgba(255,255,255,.015))}
  .kpi .k{font-size:12px;color:#8A94AD}
  .kpi .v{font-family:'Space Grotesk';font-weight:700;font-size:30px;margin-top:8px;background:linear-gradient(120deg,#22D3EE,#8B5CF6);-webkit-background-clip:text;background-clip:text;color:transparent}
  .kpi .d{font-size:12px;margin-top:6px}
  .up{color:#7CE7BE} .down{color:#FDA4B4}
  .panel{border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:22px;background:rgba(255,255,255,.025);margin-top:18px}
  .panel h3{font-family:'Space Grotesk';font-weight:600;font-size:17px;margin-bottom:4px}
  .panel .pd{font-size:13px;color:#8A94AD;margin-bottom:16px}
  .two{display:grid;grid-template-columns:1.3fr 1fr;gap:18px;margin-top:18px}
  @media(max-width:860px){.two{grid-template-columns:1fr}}
  .bar{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .bar .lab{width:210px;font-size:12.5px;color:#C9D2E6;flex:0 0 auto}
  .bar .track{flex:1;height:10px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden}
  .bar .fill{height:100%;border-radius:6px}
  .bar .num{width:34px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;color:#9AA4BD}
  .trend{display:flex;align-items:flex-end;gap:8px;height:160px;margin-top:8px}
  .trend .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;justify-content:flex-end;height:100%}
  .trend .bcol{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#22D3EE,#3B82F6)}
  .trend .cl{font-size:11px;color:#8A94AD}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;padding:11px 12px;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:#9AA4BD;border-bottom:1px solid rgba(255,255,255,.1);white-space:nowrap}
  td{padding:11px 12px;border-bottom:1px solid rgba(255,255,255,.06);color:#C9D2E6;vertical-align:top}
  tr:hover td{background:rgba(255,255,255,.02)}
  .tblwrap{overflow-x:auto}
  .pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:8px;font-family:'JetBrains Mono',monospace;white-space:nowrap}
  .s-vpos{background:rgba(16,185,129,.22);color:#7CE7BE}
  .s-pos{background:rgba(34,211,238,.18);color:#7FE6F5}
  .s-miss{background:rgba(251,191,36,.2);color:#FBD34D}
  .s-neg{background:rgba(244,63,94,.2);color:#FDA4B4}
  .s-neu{background:rgba(148,163,184,.2);color:#CBD5E1}
  .r-res{color:#7CE7BE} .r-pen{color:#FBD34D} .r-unr{color:#FDA4B4}
  .btn{cursor:pointer;font-family:'Space Grotesk';font-weight:600;font-size:13px;color:#04101f;padding:9px 16px;border:none;border-radius:10px;background:linear-gradient(120deg,#22D3EE,#3B82F6)}
  .btn:hover{filter:brightness(1.07)}
  .btn.ghost{background:rgba(255,255,255,.04);color:#D7DEEF;border:1px solid rgba(255,255,255,.14)}
  .btn.sm{padding:6px 12px;font-size:12px}
  select.fld,input.fld{background:rgba(3,7,18,.6);border:1px solid rgba(255,255,255,.14);border-radius:10px;color:#E8ECF6;padding:10px 12px;font-family:inherit;font-size:14px;outline:none}
  select.fld:focus,input.fld:focus{border-color:rgba(34,211,238,.5)}
  .verdict{border:1px solid rgba(139,92,246,.35);background:linear-gradient(150deg,rgba(139,92,246,.14),rgba(34,211,238,.05));border-radius:14px;padding:18px;margin-top:16px}
  .verdict .vh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .verdict .lbl{font-family:'JetBrains Mono',monospace;font-size:11px;color:#C4B0FF;letter-spacing:.1em}
  .kv{display:grid;grid-template-columns:150px 1fr;gap:6px 14px;font-size:13.5px;margin-top:6px}
  .kv .kk{color:#8A94AD}
  .hide{display:none}
  .msg{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.7;background:rgba(3,7,18,.5);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px;max-height:260px;overflow:auto;white-space:pre-wrap}
  .foot{margin-top:36px;text-align:center;color:#6E7891;font-size:13px}
  .toolrow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  .adminnote{font-size:13px;color:#9AA4BD;line-height:1.6}
</style>

<body>
<div class="app">
  <aside class="side">
    <div class="logo"><div class="mk">A</div><div class="nm">Approach<small>Sentiment Tracking</small></div></div>
    <nav id="nav">
      <div class="navitem on" data-view="dashboard"><span class="ic">▚</span>Dashboard</div>
      <div class="navitem" data-view="run"><span class="ic">▶</span>Run Audit</div>
      <div class="navitem" data-view="results"><span class="ic">▤</span>Results</div>
      <div class="navitem" data-view="disputes"><span class="ic">⚑</span>Disputes</div>
      <div class="navitem" data-view="admin"><span class="ic">⚙</span>Admin</div>
    </nav>
    <div class="rolebox">
      <div class="k">Demo role</div>
      <select id="role"><option value="admin">Admin</option><option value="supervisor">Supervisor</option><option value="agent">Agent</option></select>
      <div class="who" id="who">Signed in as <b>Demo Admin</b></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <a class="back" href="../Faiyaz Portfolio.dc.html">← Back to portfolio</a>
      <span class="demo-badge"><b></b>Demo · mock data · no login required</span>
    </div>
    <div id="stage"></div>
    <p class="foot">Demo build · mock Supabase layer · deterministic AI verdicts · Developed by Faiyaz Muhtasim Ahmed</p>
  </main>
</div>

<script>
// ---------- Mock data ----------
const AGENTS=["Aria N.","Bilal K.","Chen W.","Dina R.","Emon H.","Farah S."];
const SENT=[
 {k:"Highly Likely Positive Review",c:"s-vpos"},
 {k:"Likely Positive Review",c:"s-pos"},
 {k:"Missed Opportunity",c:"s-miss"},
 {k:"Negative Outcome - No Review Request",c:"s-neg"},
 {k:"Likely Negative Review",c:"s-neg"},
 {k:"Neutral",c:"s-neu"}
];
const CLIENT_SENT=["Very Positive","Positive","Slightly Positive","Neutral","Slightly Negative","Negative"];
const RESO=[["Resolved","r-res"],["Pending","r-pen"],["Unresolved","r-unr"]];
const TOPICS=["Payout delay","KYC verification","Platform login issue","Refund request","Spread complaint","Account upgrade","Withdrawal method","Challenge rules","Deposit not credited","Copy-trading query"];

function pick(a,i){return a[i%a.length];}
const CONV=[];
const seed=[3,1,0,2,1,4,0,2,5,1,3,0,2,1,0,4,2,1,3,0,2,1,5,0];
for(let i=0;i<24;i++){
  const s=SENT[seed[i]%SENT.length];
  const reso=RESO[(seed[i]+i)%RESO.length];
  const cs=CLIENT_SENT[(seed[i]+2)%CLIENT_SENT.length];
  CONV.push({
    id:70000+i*13,
    agent:pick(AGENTS,i),
    topic:pick(TOPICS,i+seed[i]),
    sentiment:s.k, sc:s.c,
    client:cs,
    reso:reso[0], rc:reso[1],
    date:`2026-06-${String(2+(i%26)).padStart(2,'0')}`,
    audited:i<18
  });
}

// ---------- Deterministic "AI" verdict ----------
function generateVerdict(c){
  const positive=/Positive/.test(c.client);
  const missed=c.sentiment==="Missed Opportunity";
  let recommendation, reviewAsk, risk;
  if(missed){recommendation="Missed opportunity — the client was satisfied but no review was requested.";reviewAsk="Not requested";risk="Medium";}
  else if(positive){recommendation="Strong candidate — client sentiment is positive; a review request was appropriate.";reviewAsk="Requested at the right moment";risk="Low";}
  else {recommendation="Review request not advisable while the client remained unsatisfied.";reviewAsk="Correctly withheld";risk=c.reso==="Unresolved"?"High":"Medium";}
  const snippet=`"Thanks for sorting that out for me, ${c.topic.toLowerCase()} was stressing me out."`;
  return {recommendation,reviewAsk,risk,snippet,confidence:missed?72:positive?91:80};
}

// ---------- Views ----------
const stage=document.getElementById('stage');
let role="admin";

function kpiRow(){
  const total=CONV.length;
  const likelyPos=CONV.filter(c=>/Positive Review/.test(c.sentiment)).length;
  const missed=CONV.filter(c=>c.sentiment==="Missed Opportunity").length;
  const res=CONV.filter(c=>c.reso==="Resolved").length;
  const rate=Math.round(res/total*100);
  return `<div class="kpis">
    <div class="kpi"><div class="k">Total conversations</div><div class="v">${total}</div><div class="d up">▲ 12% vs prev period</div></div>
    <div class="kpi"><div class="k">Likely positive reviews</div><div class="v">${likelyPos}</div><div class="d up">▲ 8%</div></div>
    <div class="kpi"><div class="k">Missed opportunities</div><div class="v">${missed}</div><div class="d down">▲ 3 to recover</div></div>
    <div class="kpi"><div class="k">Resolution rate</div><div class="v">${rate}%</div><div class="d up">▲ 5%</div></div>
  </div>`;
}

function sentimentBars(){
  const colors={"Highly Likely Positive Review":"#10B981","Likely Positive Review":"#22D3EE","Missed Opportunity":"#FBBF24","Negative Outcome - No Review Request":"#F43F5E","Likely Negative Review":"#EC4899","Neutral":"#94A3B8"};
  const counts={}; SENT.forEach(s=>counts[s.k]=0);
  CONV.forEach(c=>counts[c.sentiment]=(counts[c.sentiment]||0)+1);
  const max=Math.max(...Object.values(counts));
  let h='';
  SENT.forEach(s=>{const n=counts[s.k]||0;h+=`<div class="bar"><div class="lab">${s.k}</div><div class="track"><div class="fill" style="width:${max?n/max*100:0}%;background:${colors[s.k]}"></div></div><div class="num">${n}</div></div>`;});
  return h;
}

function trend(){
  const weeks=["W1","W2","W3","W4","W5","W6"];
  const vals=[9,12,11,15,13,18];
  const max=Math.max(...vals);
  let h='<div class="trend">';
  weeks.forEach((w,i)=>{h+=`<div class="col"><div class="bcol" style="height:${vals[i]/max*100}%"></div><div class="cl">${w}</div></div>`;});
  return h+'</div>';
}

function sentPill(c){const s=SENT.find(x=>x.k===c.sentiment)||{c:"s-neu"};return `<span class="pill ${s.c}">${c.sentiment}</span>`;}

function resultsTable(rows){
  let h='<div class="tblwrap"><table><thead><tr><th>Conv ID</th><th>Date</th><th>Agent</th><th>Topic</th><th>Client sentiment</th><th>Review verdict</th><th>Resolution</th>'+(role!=='agent'?'<th></th>':'')+'</tr></thead><tbody>';
  rows.forEach(c=>{
    h+=`<tr><td style="font-family:'JetBrains Mono',monospace">#${c.id}</td><td>${c.date}</td><td>${c.agent}</td><td>${c.topic}</td><td>${c.client}</td><td>${sentPill(c)}</td><td class="${c.rc}">${c.reso}</td>`+
    (role!=='agent'?`<td><button class="btn ghost sm" onclick="openDispute(${c.id})">Dispute</button></td>`:'')+`</tr>`;
  });
  return h+'</tbody></table></div>';
}

function renderDashboard(){
  stage.innerHTML=`<span class="eyebrow">Overview</span><h1>Sentiment Dashboard</h1><p class="sub">Review-request performance and client sentiment across support conversations. Past 4 weeks.</p>
  ${kpiRow()}
  <div class="two">
    <div class="panel"><h3>Review sentiment distribution</h3><div class="pd">How conversations map to review-request outcomes.</div>${sentimentBars()}</div>
    <div class="panel"><h3>Likely positive reviews — weekly</h3><div class="pd">Trend of review-worthy conversations.</div>${trend()}</div>
  </div>
  <div class="panel"><h3>Recent audited conversations</h3><div class="pd">Most recent AI-audited support conversations.</div>${resultsTable(CONV.filter(c=>c.audited).slice(0,8))}</div>`;
}

function renderResults(){
  stage.innerHTML=`<span class="eyebrow">Stored results</span><h1>Audit Results</h1><p class="sub">Every conversation that has been audited, with its stored AI verdict. ${role==='agent'?'You are viewing your own results only.':'Filter, review, and dispute verdicts.'}</p>
  <div class="toolrow" style="margin-top:18px">
    <select class="fld" id="fAgent"><option value="">All agents</option>${AGENTS.map(a=>`<option>${a}</option>`).join('')}</select>
    <select class="fld" id="fSent"><option value="">All verdicts</option>${SENT.map(s=>`<option>${s.k}</option>`).join('')}</select>
  </div>
  <div class="panel" id="resPanel"></div>`;
  const draw=()=>{
    const a=document.getElementById('fAgent').value, s=document.getElementById('fSent').value;
    let rows=CONV.filter(c=>c.audited);
    if(role==='agent') rows=rows.filter(c=>c.agent===AGENTS[0]);
    if(a) rows=rows.filter(c=>c.agent===a);
    if(s) rows=rows.filter(c=>c.sentiment===s);
    document.getElementById('resPanel').innerHTML=`<h3>${rows.length} results</h3><div class="pd">Stored evidence-backed verdicts.</div>${resultsTable(rows)}`;
  };
  document.getElementById('fAgent').onchange=draw;
  document.getElementById('fSent').onchange=draw;
  draw();
}

function renderRun(){
  stage.innerHTML=`<span class="eyebrow">Workflow</span><h1>Run Audit</h1><p class="sub">Pick an unaudited conversation, preview it, and generate an AI verdict. In the live app this calls the model; here it runs a deterministic mock.</p>
  <div class="panel" style="margin-top:18px">
    <div class="toolrow">
      <select class="fld" id="convPick" style="min-width:280px"></select>
      <button class="btn" id="genBtn">Generate verdict</button>
    </div>
    <div class="two" style="grid-template-columns:1fr 1fr">
      <div><div class="lbl eyebrow" style="margin-bottom:8px">Conversation preview</div><div class="msg" id="preview"></div></div>
      <div id="verdictSlot"></div>
    </div>
  </div>`;
  const pool=CONV.filter(c=>!c.audited).concat(CONV.filter(c=>c.audited).slice(0,4));
  const sel=document.getElementById('convPick');
  sel.innerHTML=pool.map(c=>`<option value="${c.id}">#${c.id} · ${c.agent} · ${c.topic}</option>`).join('');
  const showPreview=()=>{
    const c=CONV.find(x=>x.id==sel.value);
    document.getElementById('preview').textContent=
`[Client] Hi, I have an issue with ${c.topic.toLowerCase()}.
[${c.agent}] Thanks for reaching out! Let me take a look at that for you right away.
[Client] Okay, thank you.
[${c.agent}] I've checked your account and applied the fix. You should see it updated shortly.
[Client] ${/Positive/.test(c.client)?"Amazing, that was so quick. Really appreciate the help!":"Alright. Let's see if it works this time."}
[${c.agent}] Happy to help! Is there anything else I can do for you today?`;
    document.getElementById('verdictSlot').innerHTML='';
  };
  sel.onchange=showPreview; showPreview();
  document.getElementById('genBtn').onclick=()=>{
    const c=CONV.find(x=>x.id==sel.value);
    const v=generateVerdict(c);
    document.getElementById('verdictSlot').innerHTML=`<div class="verdict">
      <div class="vh"><span class="lbl">AI VERDICT · ${v.confidence}% confidence</span></div>
      <div style="font-family:'Space Grotesk';font-weight:600;font-size:16px;margin-bottom:12px">${sentPill(c)}</div>
      <div class="kv">
        <div class="kk">Recommendation</div><div>${v.recommendation}</div>
        <div class="kk">Review request</div><div>${v.reviewAsk}</div>
        <div class="kk">Client sentiment</div><div>${c.client}</div>
        <div class="kk">Risk level</div><div>${v.risk}</div>
        <div class="kk">Calibration snippet</div><div>${v.snippet}</div>
      </div>
    </div>`;
    if(!c.audited){c.audited=true;}
  };
}

function renderDisputes(){
  if(role==='agent'){stage.innerHTML=`<span class="eyebrow">Restricted</span><h1>Disputes</h1><p class="sub">Agents can raise disputes from the Results page but cannot view the full disputes queue. Switch to Supervisor or Admin to see it.</p>`;return;}
  const disputed=CONV.filter((c,i)=>i%7===0).slice(0,4);
  stage.innerHTML=`<span class="eyebrow">Calibration</span><h1>Disputes Queue</h1><p class="sub">Verdicts flagged for human calibration, with the master verdict decision.</p>
  <div class="panel" style="margin-top:18px"><div class="tblwrap"><table><thead><tr><th>Conv ID</th><th>Agent</th><th>AI verdict</th><th>Raised by</th><th>Status</th>${role==='admin'?'<th>Master verdict</th>':''}</tr></thead><tbody>
  ${disputed.map((c,i)=>`<tr><td style="font-family:'JetBrains Mono',monospace">#${c.id}</td><td>${c.agent}</td><td>${sentPill(c)}</td><td>${pick(AGENTS,i+1)}</td><td class="${i===0?'r-pen':'r-res'}">${i===0?'Pending review':'Calibrated'}</td>${role==='admin'?`<td><button class="btn sm" onclick="alert('Master verdict saved (demo).')">Set verdict</button></td>`:''}</tr>`).join('')}
  </tbody></table></div></div>`;
}

function renderAdmin(){
  if(role!=='admin'){stage.innerHTML=`<span class="eyebrow">Restricted</span><h1>Admin</h1><p class="sub">Admin controls are only visible to Admin role. Switch the demo role to Admin (top-left) to explore agent mappings, prompt management, role grants, and the overview report.</p>`;return;}
  stage.innerHTML=`<span class="eyebrow">Configuration</span><h1>Admin Controls</h1><p class="sub">Manage agent mappings, prompts, role permissions, and generate the leadership overview report.</p>
  <div class="two" style="grid-template-columns:1fr 1fr;margin-top:18px">
    <div class="panel"><h3>Agent → team mapping</h3><div class="pd">Map Intercom admins to CX teams.</div>
      <div class="tblwrap"><table><thead><tr><th>Agent</th><th>Team</th><th>Status</th></tr></thead><tbody>
      ${AGENTS.map((a,i)=>`<tr><td>${a}</td><td>${['VE PSTF','Live Chat','PSTF','VE PSTF','Live Chat','PSTF'][i]}</td><td class="r-res">Mapped</td></tr>`).join('')}
      </tbody></table></div></div>
    <div class="panel"><h3>Role permissions</h3><div class="pd">Who can see and do what.</div>
      <div class="tblwrap"><table><thead><tr><th>Capability</th><th>Admin</th><th>Supervisor</th><th>Agent</th></tr></thead><tbody>
      ${[["View dashboard","✓","✓","own"],["Run audits","✓","✓","—"],["Dispute verdicts","✓","✓","own"],["Set master verdict","✓","—","—"],["Manage prompts","✓","—","—"]].map(r=>`<tr><td>${r[0]}</td><td class="r-res">${r[1]}</td><td class="${r[2]==='—'?'r-unr':'r-res'}">${r[2]}</td><td class="${r[3]==='—'?'r-unr':'r-pen'}">${r[3]}</td></tr>`).join('')}
      </tbody></table></div></div>
  </div>
  <div class="panel"><h3>Prompt management</h3><div class="pd">The system prompt driving verdict generation (editable in the live app).</div>
    <div class="msg">You are a QA analyst for a client-experience team. Given a support conversation, classify the review-request outcome (Highly Likely Positive Review, Likely Positive Review, Missed Opportunity, Negative Outcome, Likely Negative Review, Neutral), judge whether a review was requested at the right moment, assess client sentiment and resolution, and extract one calibration snippet as evidence. Return structured JSON.</div>
  </div>
  <div class="panel"><h3>Leadership overview report</h3><div class="pd">Generate a period summary for leadership.</div>
    <button class="btn" id="repBtn">Generate report</button>
    <div id="repOut" style="margin-top:14px"></div>
  </div>`;
  document.getElementById('repBtn').onclick=()=>{
    const total=CONV.length, missed=CONV.filter(c=>c.sentiment==="Missed Opportunity").length, pos=CONV.filter(c=>/Positive Review/.test(c.sentiment)).length;
    document.getElementById('repOut').innerHTML=`<div class="verdict"><div class="vh"><span class="lbl">OVERVIEW · PAST 4 WEEKS</span></div>
    <div class="kv"><div class="kk">Conversations audited</div><div>${CONV.filter(c=>c.audited).length} of ${total}</div>
    <div class="kk">Review-worthy</div><div>${pos} conversations (${Math.round(pos/total*100)}%)</div>
    <div class="kk">Missed opportunities</div><div>${missed} — coaching opportunity for review-ask timing</div>
    <div class="kk">Top strength</div><div>Fast resolution on payout & KYC topics</div>
    <div class="kk">Recommended focus</div><div>Prompt agents to ask for a review after a confirmed positive resolution</div></div></div>`;
  };
}

const VIEWS={dashboard:renderDashboard,run:renderRun,results:renderResults,disputes:renderDisputes,admin:renderAdmin};
function go(v){document.querySelectorAll('.navitem').forEach(n=>n.classList.toggle('on',n.dataset.view===v));(VIEWS[v]||renderDashboard)();}
document.querySelectorAll('.navitem').forEach(n=>n.addEventListener('click',()=>{if(!n.classList.contains('locked'))go(n.dataset.view);}));

function applyRole(){
  const names={admin:"Demo Admin",supervisor:"Demo Supervisor",agent:AGENTS[0]};
  document.getElementById('who').innerHTML=`Signed in as <b>${names[role]}</b>`;
  const adminItem=document.querySelector('.navitem[data-view="admin"]');
  adminItem.classList.toggle('locked',role!=='admin');
  const runItem=document.querySelector('.navitem[data-view="run"]');
  runItem.classList.toggle('locked',role==='agent');
}
document.getElementById('role').addEventListener('change',e=>{role=e.target.value;applyRole();const cur=document.querySelector('.navitem.on').dataset.view;go(cur);});

// expose for inline handlers
window.openDispute=(id)=>alert('Dispute raised for #'+id+' (demo). It would appear in the Disputes queue for calibration.');

applyRole();
renderDashboard();
</script>
</body>
</html>
